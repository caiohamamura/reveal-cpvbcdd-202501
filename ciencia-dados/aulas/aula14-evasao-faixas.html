<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    html,
    body,
    #plot {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #282a36;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="plot"></div>

  <script>
    const faixas = ['0-40%', '40-60%', '60-75%', '75-90%', '90-100%'];
    const alunos = [18, 32, 41, 38, 25];
    const evasao = [0.61, 0.38, 0.17, 0.08, 0.03];

    const barras = {
      type: 'bar',
      x: faixas,
      y: alunos,
      marker: { color: '#6272a4' },
      name: 'quantidade de alunos',
      yaxis: 'y',
      hovertemplate: '%{y} alunos<extra></extra>'
    };

    const linha = {
      type: 'scatter',
      mode: 'lines+markers+text',
      x: faixas,
      y: evasao.map(v => v * 100),
      marker: { color: '#ff5555', size: 14 },
      line: { color: '#ff5555', width: 4 },
      text: evasao.map(v => `${Math.round(v * 100)}%`),
      textposition: 'top center',
      name: 'taxa de evasão',
      yaxis: 'y2',
      hovertemplate: '%{y:.0f}% de evasão<extra></extra>'
    };

    const layout = {
      paper_bgcolor: '#282a36',
      plot_bgcolor: '#282a36',
      margin: { l: 60, r: 70, t: 35, b: 60 },
      font: { color: '#f8f8f2', size: 16 },
      title: { text: 'Evasão por faixa de frequência', font: { color: '#8be9fd', size: 24 } },
      legend: { orientation: 'h', x: 0.05, y: 1.1 },
      xaxis: { title: 'frequência no semestre', gridcolor: '#44475a' },
      yaxis: { title: 'alunos', gridcolor: '#44475a', zerolinecolor: '#6272a4' },
      yaxis2: {
        title: 'taxa de evasão (%)',
        overlaying: 'y',
        side: 'right',
        range: [0, 75],
        gridcolor: '#44475a',
        zerolinecolor: '#6272a4'
      }
    };

    const steps = [
      [barras],
      [barras, linha],
      [{ ...barras, marker: { color: ['#ff5555', '#ffb86c', '#6272a4', '#6272a4', '#6272a4'] } }, linha]
    ];

    function renderStep(step) {
      return Plotly.react('plot', steps[step], layout, { displayModeBar: false, responsive: true });
    }

    renderStep(0);

    var _transitions = [
      {
        index: 0,
        transitionForward: () => renderStep(1),
        transitionBackward: () => renderStep(0)
      },
      {
        index: 1,
        transitionForward: () => renderStep(2),
        transitionBackward: () => renderStep(1)
      }
    ];
  </script>
</body>
</html>
