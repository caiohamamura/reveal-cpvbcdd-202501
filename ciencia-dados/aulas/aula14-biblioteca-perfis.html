<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    html,
    body,
    #plot {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #282a36;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="plot"></div>

  <script>
    const cursos = ['Informática', 'Informática', 'Informática', 'Administração', 'Administração', 'Administração', 'Química', 'Química', 'Química'];
    const livrosTecnicos = [18, 22, 26, 7, 9, 12, 14, 16, 19];
    const literatura = [4, 6, 8, 17, 20, 22, 9, 12, 14];
    const atraso = [1, 2, 1, 5, 4, 6, 2, 3, 2];
    const cores = cursos.map(c => c === 'Informática' ? '#8be9fd' : c === 'Administração' ? '#ff79c6' : '#50fa7b');

    const pontos = {
      type: 'scatter',
      mode: 'markers+text',
      x: livrosTecnicos,
      y: literatura,
      text: cursos.map((c, i) => `${c.slice(0, 3)} ${i + 1}`),
      textposition: 'top center',
      marker: {
        size: atraso.map(a => 12 + a * 3),
        color: cores,
        line: { color: '#f8f8f2', width: 1 }
      },
      hovertemplate: 'Curso: %{customdata[0]}<br>Técnicos: %{x}<br>Literatura: %{y}<br>Atrasos: %{customdata[1]}<extra></extra>',
      customdata: cursos.map((c, i) => [c, atraso[i]])
    };

    const anotacoesBase = [];
    const anotacoesCluster = [
      { x: 23, y: 7, text: 'perfil técnico', showarrow: true, arrowcolor: '#8be9fd', font: { color: '#8be9fd' } },
      { x: 10, y: 21, text: 'perfil leitura geral', showarrow: true, arrowcolor: '#ff79c6', font: { color: '#ff79c6' } },
      { x: 17, y: 13, text: 'perfil misto', showarrow: true, arrowcolor: '#50fa7b', font: { color: '#50fa7b' } }
    ];

    function layout(annotations) {
      return {
        paper_bgcolor: '#282a36',
        plot_bgcolor: '#282a36',
        margin: { l: 70, r: 20, t: 35, b: 60 },
        font: { color: '#f8f8f2', size: 16 },
        showlegend: false,
        title: { text: 'Perfis de uso da biblioteca', font: { color: '#8be9fd', size: 24 } },
        xaxis: { title: 'empréstimos técnicos', range: [4, 29], gridcolor: '#44475a', zerolinecolor: '#6272a4' },
        yaxis: { title: 'empréstimos de literatura', range: [2, 25], gridcolor: '#44475a', zerolinecolor: '#6272a4' },
        annotations
      };
    }

    const pontosSemTexto = { ...pontos, mode: 'markers' };
    const pontosComDestaque = {
      ...pontos,
      marker: { ...pontos.marker, size: atraso.map(a => a >= 5 ? 32 : 16) }
    };

    function renderStep(step) {
      if (step === 0) return Plotly.react('plot', [pontosSemTexto], layout(anotacoesBase), { displayModeBar: false, responsive: true });
      if (step === 1) return Plotly.react('plot', [pontos], layout(anotacoesCluster), { displayModeBar: false, responsive: true });
      return Plotly.react('plot', [pontosComDestaque], layout(anotacoesCluster), { displayModeBar: false, responsive: true });
    }

    renderStep(0);

    var _transitions = [
      {
        index: 0,
        transitionForward: () => renderStep(1),
        transitionBackward: () => renderStep(0)
      },
      {
        index: 1,
        transitionForward: () => renderStep(2),
        transitionBackward: () => renderStep(1)
      }
    ];
  </script>
</body>
</html>
