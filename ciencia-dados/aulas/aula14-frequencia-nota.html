<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    html,
    body,
    #plot {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #282a36;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="plot"></div>

  <script>
    const freq = [42, 48, 55, 58, 61, 66, 70, 72, 76, 81, 84, 88, 91, 95, 98];
    const nota = [3.2, 4.1, 4.8, 5.0, 5.6, 6.1, 6.4, 6.7, 7.2, 7.8, 8.0, 8.5, 8.7, 9.1, 9.4];
    const risco = nota.map((n, i) => n < 6 || freq[i] < 60 ? 'risco' : 'ok');

    const baseTrace = {
      type: 'scatter',
      mode: 'markers+text',
      x: freq,
      y: nota,
      text: freq.map((_, i) => `A${i + 1}`),
      textposition: 'top center',
      marker: {
        size: 16,
        color: risco.map(r => r === 'risco' ? '#ff5555' : '#8be9fd'),
        line: { color: '#f8f8f2', width: 1 }
      },
      hovertemplate: 'Frequência: %{x}%<br>Nota: %{y}<extra></extra>',
      name: 'estudantes'
    };

    const lineTrace = {
      type: 'scatter',
      mode: 'lines',
      x: [40, 100],
      y: [3.2, 9.4],
      line: { color: '#50fa7b', width: 4, dash: 'dot' },
      hoverinfo: 'skip',
      name: 'tendência'
    };

    const layout = {
      paper_bgcolor: '#282a36',
      plot_bgcolor: '#282a36',
      margin: { l: 60, r: 20, t: 35, b: 55 },
      font: { color: '#f8f8f2', size: 16 },
      showlegend: false,
      title: { text: 'Frequência x nota final', font: { color: '#8be9fd', size: 24 } },
      xaxis: { title: 'frequência (%)', range: [35, 102], gridcolor: '#44475a', zerolinecolor: '#6272a4' },
      yaxis: { title: 'nota final', range: [2.5, 10], gridcolor: '#44475a', zerolinecolor: '#6272a4' },
      annotations: [
        {
          x: 52,
          y: 4.2,
          text: 'grupo em risco',
          showarrow: true,
          arrowcolor: '#ff5555',
          font: { color: '#ff5555', size: 16 }
        }
      ]
    };

    const steps = [
      [baseTrace],
      [baseTrace, lineTrace],
      [{
        ...baseTrace,
        marker: { ...baseTrace.marker, size: risco.map(r => r === 'risco' ? 24 : 14) }
      }, lineTrace]
    ];

    function renderStep(step) {
      return Plotly.react('plot', steps[step], layout, { displayModeBar: false, responsive: true });
    }

    renderStep(0);

    var _transitions = [
      {
        index: 0,
        transitionForward: () => renderStep(1),
        transitionBackward: () => renderStep(0)
      },
      {
        index: 1,
        transitionForward: () => renderStep(2),
        transitionBackward: () => renderStep(1)
      }
    ];
  </script>
</body>
</html>
