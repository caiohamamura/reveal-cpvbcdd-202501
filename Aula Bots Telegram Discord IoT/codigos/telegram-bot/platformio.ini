[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino

build_flags =
    -Og
    -Wall -Wextra
    -D LED_BUILTIN=2
    -I include

monitor_speed = 115200
monitor_filters = esp8266_exception_decoder

lib_deps =
    cotestatnt/AsyncTelegram2@^2.3.4
    bblanchon/ArduinoJson@^7.3.1
    adafruit/DHT sensor library@^1.4.6