[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino

lib_deps = 
    witnessmenow/Universal Arduino Telegram Bot@^1.3.0
    adafruit/Adafruit DHT sensor@^3.3.10
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    tzapu/WiFiManager@^2.0.16

build_flags = 
    -DTELEGRAM_BOT_TOKEN=\"${this.telegram_bot_token}\"

monitor_speed = 115200